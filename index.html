<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Food Pre-Order Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="bg-red-600 text-white p-4 text-center font-bold text-xl shadow-md sticky top-0 z-10">
            TU FOOD PRE-ORDER
        </header>

        <main class="p-4 flex-grow">
            
            <div id="step1" class="step active bg-white p-6 rounded-xl shadow-sm border mt-4">
                <h2 class="text-lg font-bold mb-4">ข้อมูลผู้ใช้บริการ</h2>
                <input type="text" id="userName" placeholder="ชื่อนักศึกษา" class="w-full border p-3 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-red-500">
                <input type="tel" id="userPhone" placeholder="เบอร์โทรศัพท์ (สำหรับรับคิว)" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-red-500">
                <button onclick="goToStep(2)" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">เข้าสู่ระบบ</button>
            </div>

            <div id="step2" class="step">
                <h2 class="text-lg font-bold mb-4 text-gray-700">เลือกโรงอาหาร</h2>
                <div class="grid grid-cols-1 gap-3" id="canteenList">
                    </div>
            </div>

            <div id="step3" class="step">
                <button onclick="goToStep(2)" class="text-red-600 mb-4 flex items-center">← ย้อนกลับ</button>
                <h2 id="currentCanteen" class="text-xl font-bold mb-4 text-red-600"></h2>
                <div class="grid grid-cols-1 gap-4" id="shopList">
                    </div>
            </div>

            <div id="step4" class="step">
                <button onclick="goToStep(3)" class="text-red-600 mb-4">← ย้อนกลับ</button>
                <h2 class="text-lg font-bold mb-4">เมนูแนะนำ</h2>
                <div id="menuList" class="space-y-3">
                    </div>
            </div>

            <div id="step5" class="step text-center bg-white p-6 rounded-xl shadow-sm border mt-4">
                <h2 class="text-lg font-bold mb-4">สแกนชำระเงิน</h2>
                <div class="text-3xl font-bold text-red-600 mb-4" id="totalPrice">0 ฿</div>
                <div class="w-56 h-56 bg-gray-200 mx-auto mb-4 flex items-center justify-center border-2 border-dashed border-gray-400">
                    <span class="text-gray-500 text-sm p-4">img_qrcode_payment (PromptPay)</span>
                </div>
                <p class="text-xs text-gray-400 mb-6 uppercase tracking-wider">โอนเงินแล้วรอรับหมายเลขคิวทันที</p>
                <button onclick="goToStep(6)" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">ยืนยันการโอนเงิน</button>
            </div>

            <div id="step6" class="step text-center">
                <div class="bg-white p-8 rounded-3xl shadow-xl border-2 border-green-500 mt-10">
                    <div class="text-green-500 mb-2 flex justify-center">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-green-600 mb-2">สั่งอาหารสำเร็จ!</h2>
                    <p class="text-gray-500 text-sm mb-6">ระบบจะส่งข้อความแจ้งเตือนไปที่เครื่องคุณ</p>
                    <div class="text-[10px] uppercase tracking-[0.2em] text-gray-400">Your Queue Number</div>
                    <div class="text-8xl font-black text-gray-800 my-4" id="finalQueue">A-001</div>
                    <div class="bg-yellow-50 p-3 rounded-lg text-xs text-yellow-700">
                        กรุณาแคปหน้าจอนี้ไว้แสดงที่เคาน์เตอร์
                    </div>
                </div>
                <button onclick="location.reload()" class="mt-8 text-gray-400 text-sm underline">เริ่มสั่งใหม่อีกครั้ง</button>
            </div>

        </main>
    </div>

    <script>
        const canteens = ["โรงอาหารกรีน", "โรงอาหารทิวสน", "โรงอาหาร SC", "โรงอาหาร JC", "โรงอาหาร บร.4", "โรงอาหารปิยชาติ", "โรงอาหารวิศวะ"];
        
        const shops = [
            { name: "ข้าวมันไก่เฮียชัย", img: "img_shop_1" },
            { name: "ก๋วยเตี๋ยวดู๋ดี๋", img: "img_shop_2" },
            { name: "สลัดบาร์เพื่อสุขภาพ", img: "img_shop_3" }
        ];

        const menus = [
            { name: "สลัดอกไก่ไข่ต้ม", price: 65, cal: "280 kcal", healthy: true, tag: "Low Carb" },
            { name: "ข้าวคลุกกะปิ (ลดเค็ม)", price: 50, cal: "450 kcal", healthy: true, tag: "Healthy Choice" },
            { name: "ข้าวผัดกระเพราไก่", price: 45, cal: "520 kcal", healthy: false }
        ];

        function goToStep(stepNum) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNum).classList.add('active');
            window.scrollTo(0,0);

            if(stepNum === 2) renderCanteens();
            if(stepNum === 6) {
                // สุ่มเลขคิวเล่นๆ ให้ดูสมจริง
                const rand = Math.floor(Math.random() * 100);
                document.getElementById('finalQueue').innerText = 'A-' + rand.toString().padStart(3, '0');
            }
        }

        function renderCanteens() {
            const list = document.getElementById('canteenList');
            list.innerHTML = canteens.map(c => `
                <button onclick="selectCanteen('${c}')" class="bg-white p-4 rounded-xl border border-gray-200 text-left shadow-sm flex justify-between items-center hover:bg-red-50">
                    <span class="font-medium">${c}</span>
                    <span class="text-red-300">→</span>
                </button>
            `).join('');
        }

        function selectCanteen(name) {
            document.getElementById('currentCanteen').innerText = name;
            renderShops();
            goToStep(3);
        }

        function renderShops() {
            const list = document.getElementById('shopList');
            list.innerHTML = shops.map(s => `
                <div onclick="goToStep(4)" class="bg-white rounded-xl overflow-hidden shadow-sm border cursor-pointer hover:shadow-md transition">
                    <div class="h-24 bg-gray-100 flex items-center justify-center text-gray-400 text-xs">${s.img}</div>
                    <div class="p-3 font-bold text-gray-700">${s.name}</div>
                </div>
            `).join('');
        }

        function renderMenus() {
            const list = document.getElementById('menuList');
            list.innerHTML = menus.map(m => `
                <div class="bg-white p-4 rounded-xl border shadow-sm relative">
                    ${m.healthy ? `<span class="absolute top-2 right-2 bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full font-bold">✨ เพื่อสุขภาพ</span>` : ''}
                    <div class="font-bold text-gray-800">${m.name}</div>
                    <div class="text-xs text-gray-400">พลังงานประมาณ: ${m.cal}</div>
                    ${m.tag ? `<div class="text-[10px] text-blue-500 mt-1"># ${m.tag}</div>` : ''}
                    <div class="flex justify-between items-center mt-3">
                        <span class="text-red-600 font-bold">${m.price} ฿</span>
                        <button onclick="confirmOrder(${m.price})" class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium">เลือก</button>
                    </div>
                </div>
            `).join('');
        }

        function confirmOrder(price) {
            document.getElementById('totalPrice').innerText = price + ' ฿';
            goToStep(5);
        }

        // เริ่มต้น render menu รอไว้เลย
        renderMenus();
    </script>
</body>
</html>
